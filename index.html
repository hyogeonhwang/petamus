            <span style="font-size:11px;color:var(--gray)">해당 월의 교재·단원 설정 삭제 (다른 월은 유지됨)</span>
          </span>
        </label>
      </div>
    </div>

    <div id="rw-err" style="color:#c0392b;font-size:12px;min-height:16px;margin-bottom:8px"></div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="this.closest('.overlay').remove()">취소</button>
      <button class="btn btn-sm" onclick="confirmResetStep2(this)"
        style="background:#c0392b;color:#fff;font-weight:700;border:none">다음 →</button>
    </div>
  </div>`;
  document.body.appendChild(o);
}
function confirmResetStep2(btn){
  const pin=document.getElementById("rw-pin").value;
  const month=document.getElementById("rw-month").value;
  const inclCons=document.getElementById("rw-cons").checked;
  const inclProg=document.getElementById("rw-prog").checked;
  const errEl=document.getElementById("rw-err");

  if(pin!==PINS.admin){
    errEl.textContent="❌ 관리자 PIN이 올바르지 않습니다.";
    document.getElementById("rw-pin").focus();
    return;
  }
  errEl.textContent="";

  // 2단계: 최종 확인 모달
  const o2=document.createElement("div");o2.className="overlay";
  const scopeList=["성적·SR·평가·진도·코멘트·AR독서 (월별 학생 데이터)"];
  if(inclCons)scopeList.push("상담 이력 전체");
  if(inclProg)scopeList.push("반별 진도 설정 (해당 월)");

  o2.innerHTML=`<div class="modal" style="max-width:380px">
    <h2 style="color:#c0392b">⚠️ 최종 확인</h2>
    <div style="background:#fff0f0;border-radius:8px;padding:14px;margin-bottom:16px;font-size:13px;line-height:1.8">
      <div><b>초기화 월:</b> ${month.slice(0,4)}년 ${+month.slice(5)}월</div>
      <div><b>삭제 범위:</b> ${scopeList.join(", ")}</div>
      <div style="margin-top:8px;color:#c0392b;font-weight:600">이 작업은 되돌릴 수 없습니다.</div>
    </div>
    <div style="font-size:12px;color:var(--gray);margin-bottom:6px">확인을 위해 아래에 <b style="color:#c0392b">초기화</b> 를 입력하세요.</div>
    <input type="text" id="rw-confirm-text" placeholder="초기화"
      style="width:100%;border:2px solid #f5c6c6;border-radius:6px;padding:8px 10px;font-size:15px;text-align:center;margin-bottom:12px">
    <div id="rw2-err" style="color:#c0392b;font-size:12px;min-height:16px"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="this.closest('.overlay').remove()">취소</button>
      <button class="btn btn-sm" onclick="executeReset('${month}',${inclCons},${inclProg},this)"
        style="background:#c0392b;color:#fff;font-weight:700;border:none">🗑 삭제 실행</button>
    </div>
  </div>`;
  // 1단계 닫고 2단계 열기
  btn.closest(".overlay").remove();
  document.body.appendChild(o2);
}
async function executeReset(month,inclCons,inclProg,btn){
  const txt=document.getElementById("rw-confirm-text").value.trim();
  const errEl=document.getElementById("rw2-err");
  if(txt!=="초기화"){
    errEl.textContent="❌ '초기화' 를 정확히 입력해주세요.";
    return;
  }
  btn.textContent="삭제 중...";
  btn.disabled=true;
  try{
    // 1. 모든 학생의 해당 월 monthlyData 삭제
    const stuSnap=await db.ref("students").once("value");
    const stuData=stuSnap.val()||{};
    const updates={};
    Object.keys(stuData).forEach(id=>{
      updates["students/"+id+"/monthlyData/"+month]=null;
    });
    await db.ref().update(updates);

    // 2. 상담이력 삭제 (선택)
    if(inclCons){
      const consSnap=await db.ref("consultations").once("value");
      const consData=consSnap.val()||{};
      const cUpdates={};
      Object.keys(consData).forEach(id=>{ cUpdates["consultations/"+id]=null; });
      if(Object.keys(cUpdates).length)await db.ref().update(cUpdates);
    }

    // 3. 반별진도 설정 삭제 (선택, 해당 월만)
    if(inclProg){
      const pUpdates={};
      CLS.forEach(cls=>{ pUpdates["settings/classProgress/"+cls+"/"+month]=null; });
      await db.ref().update(pUpdates);
    }

    await loadStudents();
    btn.closest(".overlay").remove();
    showToast(`${month.slice(0,4)}년 ${+month.slice(5)}월 초기화 완료 ✓`);
    renderCfg();
  }catch(e){
    errEl.textContent="오류가 발생했습니다: "+e.message;
    btn.textContent="🗑 삭제 실행";
    btn.disabled=false;
  }
}

// ── TOAST ──
function showConfirmToast(msg,type="success"){
  // 기존 제거
  document.getElementById("confirm-toast")?.remove();
  const color=type==="success"?"#2e7d32":type==="error"?"#c0392b":"#1A3169";
  const icon=type==="success"?"✅":type==="error"?"❌":"ℹ️";
  const t=document.createElement("div");
  t.id="confirm-toast";
  t.style.cssText=`position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#fff;color:${color};border:2px solid ${color};border-radius:12px;padding:14px 22px;font-size:14px;font-weight:700;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.15);display:flex;align-items:center;gap:8px;max-width:90vw;text-align:center`;
  t.innerHTML=`<span style="font-size:18px">${icon}</span><span>${msg}</span>`;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}
function toggleClear(inputId, btnId){
  const val=document.getElementById(inputId)?.value||"";
  const btn=document.getElementById(btnId);
  if(btn) btn.classList.toggle("visible", val.length>0);
}
function clearSearch(inputId, btnId, callback){
  const el=document.getElementById(inputId);
  if(el){el.value="";el.focus();}
  const btn=document.getElementById(btnId);
  if(btn) btn.classList.remove("visible");
  if(callback) callback();
}


function showToast(msg){
  let t=document.getElementById("toast");
  if(!t){t=document.createElement("div");t.id="toast";t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A3169;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;transition:opacity .3s;pointer-events:none";document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity="1";
  clearTimeout(t._timer);t._timer=setTimeout(()=>t.style.opacity="0",2000);
}

// ── INIT ──
document.addEventListener("DOMContentLoaded",async()=>{
  try{
  // Check shared report link first
  const isShared=await checkSharedReport();
  if(isShared)return;

  document.getElementById("cls-sel").innerHTML=
    `<option value="admin">🔑 관리자</option>`+
    CLS.map(c=>`<option value="${c}">${CLS_EMOJI[c]} ${c}반</option>`).join("");

  document.getElementById("login-btn").onclick=doLogin;
  document.getElementById("pin-in").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});

  // Month nav init
  document.getElementById("cur-month").textContent=fmtMonth(curMonth);
  document.getElementById("prev-month").onclick=()=>changeMonth(-1);
  document.getElementById("next-month").onclick=()=>changeMonth(1);
  document.getElementById("logout-btn").onclick=()=>{
    user=null; navStack=[];
    sessionStorage.removeItem("petamus_session");
    document.getElementById("topbar").style.display="none";
    document.getElementById("layout").style.display="none";
    document.getElementById("breadcrumb").style.display="none";
    document.getElementById("past-notice").style.display="none";
    document.getElementById("mobile-nav").style.display="none";
    document.getElementById("login-wrap").style.display="flex";
    document.getElementById("pin-in").value="";
    document.getElementById("login-err").textContent="";
  };

  // 새로고침 시 세션 자동 복원
  const saved=sessionStorage.getItem("petamus_session");
  if(saved){
    try{
      const {cls,pin,scr,month,viewCls,inpTab:savedInpTab}=JSON.parse(saved);
      await loadSettings();
      if(PINS[cls]===pin){
        await loadStudents();
        await loadConsCache();
        startStudentListener();
        if(window.innerWidth<=700) document.getElementById("mobile-nav").style.display="flex";
        if(cls==="admin"){
          user={role:"admin",cls:"admin",name:"관리자",viewCls:viewCls||CLS[0]};
        } else {
          user={role:"teacher",cls,name:TCHR[cls]||cls};
        }
        if(month) curMonth=month;
        if(typeof savedInpTab==="number") inpTab=savedInpTab;
        document.getElementById("cur-month").textContent=fmtMonth(curMonth);
        buildSB();
        document.getElementById("login-wrap").style.display="none";
        // 저장된 화면으로 복원, 없으면 기본 화면
        const restoreScr=scr||{name:cls==="admin"?"home":"th",params:{}};
        go(restoreScr.name, restoreScr.params||{});
        // 진도 탭에서 새로고침한 경우 Firebase 직접 fetch
        if(restoreScr.name==="inp" && savedInpTab===2 && restoreScr.params?.id){
          await renderBooksTabAsync(restoreScr.params.id);
        }
        return;
      }
    }catch(e){ sessionStorage.removeItem("petamus_session"); }
  }

  // Show login screen
  document.getElementById("login-wrap").style.display="flex";
  }catch(e){
    console.error("Init error:",e);
    document.getElementById("login-wrap").style.display="flex";
  }
});

<script>
(function(){
  function setChartH(bar,radar,prog){
    var b=document.getElementById('rpt-main-bar');
    var r=document.getElementById('rpt-main-radar');
    var p=document.getElementById('rpt-main-progress');
    if(b&&b.parentElement) b.parentElement.style.height=bar+'px';
    if(r&&r.parentElement) r.parentElement.style.height=radar+'px';

      [b,r,p].forEach(function(el){if(el){var ch=Chart.getChart(el);if(ch)ch.resize();}});
    }
  }
  window.addEventListener('beforeprint',function(){ setChartH(215,195,195); });
  window.addEventListener('afterprint', function(){ setChartH(265,245,245); });
})();
