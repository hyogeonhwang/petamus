<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Petamus International</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR',sans-serif}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
body{background:#f4f6f9;color:#1a2a4a;height:100vh;display:flex;flex-direction:column;overflow:hidden}
:root{--navy:#1A3169;--gold:#C9A84C;--cream:#F5F0E8;--red:#e74c3c;--green:#27ae60;--gray:#8892a0;--light:#eef0f5}

/* ── TOP BAR ── */
#topbar{background:var(--navy);color:#fff;height:52px;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:100}
#topbar .logo-area{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--gold);white-space:nowrap}
#topbar .logo-area img{width:30px;height:30px;border-radius:50%;background:#fff;padding:2px}
.month-nav{display:flex;align-items:center;gap:6px;margin:0 auto}
.month-nav button{background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.month-nav button:hover{background:rgba(255,255,255,.3)}
.month-nav span{color:#fff;font-size:14px;font-weight:600;min-width:100px;text-align:center}
#topbar .right-btns{display:flex;gap:6px;align-items:center}
#topbar .right-btns button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px}
#topbar .right-btns button:hover{background:rgba(255,255,255,.3)}
#past-notice{background:#f39c12;color:#fff;text-align:center;padding:6px;font-size:12px;font-weight:600;flex-shrink:0}

/* ── LAYOUT ── */
#layout{display:flex;flex:1;overflow:hidden}
#sidebar{width:200px;background:#fff;border-right:1px solid #e0e4ec;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
#main{flex:1;overflow-y:auto;padding:16px}

/* ── SIDEBAR ── */
.sb-section{padding:8px 0}
.sb-label{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;padding:4px 14px 2px;letter-spacing:.5px}
.sb-item{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;border-radius:0;font-size:13px;color:#3a4a6a;border-left:3px solid transparent;transition:all .15s}
.sb-item:hover{background:#f0f4ff}
.sb-item.active{background:#eef2ff;color:var(--navy);border-left-color:var(--gold);font-weight:600}
.sb-item .icon{font-size:15px;width:20px;text-align:center}
.sb-cls-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sb-divider{height:1px;background:#e8ecf2;margin:4px 0}
.sb-bottom{margin-top:auto;padding:8px;border-top:1px solid #e8ecf2}

/* ── CARDS & PANELS ── */
.card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:12px}
.card h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.stat-box{background:#fff;border-radius:8px;padding:12px;text-align:center;border:1px solid #e0e4ec}
.stat-box .num{font-size:22px;font-weight:700;color:var(--navy)}
.stat-box .lbl{font-size:11px;color:var(--gray);margin-top:2px}

/* ── STUDENT LIST ── */
.stu-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;border:1px solid #e8ecf2;margin-bottom:6px;background:#fff;transition:all .15s}
.stu-item:hover{border-color:var(--gold);background:#fffdf5}
.stu-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.stu-info{flex:1;min-width:0}
.stu-name{font-size:13px;font-weight:600;color:var(--navy)}
.stu-sub{font-size:11px;color:var(--gray)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.badge-done{background:#d4edda;color:#155724}
.badge-wip{background:#fff3cd;color:#856404}
.badge-none{background:#f8d7da;color:#721c24}
.prog-bar{height:6px;background:#e8ecf2;border-radius:3px;margin-top:4px}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--navy))}

/* ── TABS ── */
.tab-bar{display:flex;gap:4px;margin-bottom:14px;border-bottom:2px solid #e8ecf2;padding-bottom:0}
.tab-btn{padding:8px 14px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;border-radius:6px 6px 0 0}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:700;background:#f0f4ff}
.tab-btn:hover{background:#f5f7ff}

/* ── FORMS ── */
.form-row{display:flex;gap:10px;margin-bottom:10px;align-items:center}
.form-group{flex:1;min-width:0}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--gray);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1px solid #d0d6e0;border-radius:6px;padding:10px;font-size:13px;font-family:inherit;vertical-align:top;resize:vertical;overflow-y:auto;color:var(--navy);transition:border .15s;background:#fff}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.15)}
.form-group textarea{resize:vertical;min-height:80px;line-height:1.5}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:#14276e}
.btn-gold{background:var(--gold);color:#fff}
.btn-gold:hover{background:#b8973b}
.btn-ghost{background:#f0f4ff;color:var(--navy);border:1px solid #d0d6e0}
.btn-ghost:hover{background:#e4eaff}
.btn-red{background:#e74c3c;color:#fff}
.btn-red:hover{background:#c0392b}
.btn-green{background:#27ae60;color:#fff}
.btn-green:hover{background:#229954}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 7px;font-size:11px}

/* ── STARS ── */
.star-row{display:flex;align-items:center;gap:4px;margin-bottom:6px}
.star-row label{min-width:90px;font-size:12px;color:#4a5a7a}
.stars{display:flex;gap:2px}
.star{font-size:18px;cursor:pointer;color:#ddd;transition:color .1s}
.star.on{color:#f1c40f}
.star:hover,.star.hover{color:#f39c12}

/* ── EVAL SECTION ── */
.eval-domain{border:1px solid #e0e4ec;border-radius:8px;padding:12px;margin-bottom:10px}
.eval-domain-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
.eval-domain-title{font-size:13px;font-weight:700;color:var(--navy)}
.eval-domain-score{font-size:13px;font-weight:700;color:var(--gold)}

/* ── SCORE INPUT ── */
.score-pair{display:flex;align-items:center;gap:6px}
.score-pair input{width:60px;text-align:center}
.score-pair span{color:var(--gray);font-size:13px}
.score-avg{font-size:12px;color:var(--gray);margin-left:8px}

/* ── REPORT ── */
.rpt-section{margin-bottom:16px}
.rpt-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.rpt-label{color:var(--gray);font-size:12px}
.rpt-val{font-weight:600;color:var(--navy)}
.rpt-comment-box{background:#fffdf5;border:1px solid #e8e0d0;border-radius:6px;padding:12px;font-size:13px;line-height:1.7;margin-bottom:8px}
.rpt-who{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;margin-bottom:4px}
.avg-chip{background:#eef2ff;color:var(--navy);border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600;margin-left:6px}

/* ── REPORT v2 ── */
.rpt-wrap{max-width:700px;margin:0 auto 16px}
.rpt2-header{background:linear-gradient(135deg,#0f1f4e 0%,#1A3169 60%,#2a4a8a 100%);border-radius:16px;padding:24px;margin-bottom:12px;color:#fff}
.rpt2-header-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.rpt2-logo{width:52px;height:52px;border-radius:50%;background:#fff;padding:3px;object-fit:contain;flex-shrink:0}
.rpt2-brand-name{font-size:15px;font-weight:800;color:#C9A84C;letter-spacing:1px}
.rpt2-brand-sub{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px}
.rpt2-divider{height:1px;background:rgba(201,168,76,.4);margin-bottom:14px}
.rpt2-stu-name{font-size:22px;font-weight:800;color:#fff;margin-bottom:8px}
.rpt2-stu-en{font-size:16px;font-weight:400;color:rgba(255,255,255,.75);margin-left:8px}
.rpt2-stu-meta{display:flex;gap:6px;flex-wrap:wrap}
.rpt2-tag{background:rgba(201,168,76,.25);color:#C9A84C;border:1px solid rgba(201,168,76,.5);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.rpt2-section{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:12px}
.rpt2-section-title{font-size:13px;font-weight:800;color:#1A3169;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #C9A84C;text-transform:uppercase;letter-spacing:.5px}
.rpt2-kpi-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.rpt2-kpi{background:#f8f9ff;border-radius:10px;padding:14px;text-align:center}
.rpt2-kpi-icon{font-size:20px;margin-bottom:4px}
.rpt2-kpi-val{font-size:22px;font-weight:800;color:#1A3169;margin-bottom:6px}
.rpt2-kpi-bar{background:#e8ecf4;border-radius:4px;height:6px;overflow:hidden;margin-bottom:6px}
.rpt2-kpi-fill{height:100%;border-radius:4px;transition:width .6s ease}
.rpt2-kpi-lbl{font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.5px}
.rpt2-kpi-raw{font-size:11px;color:#888;margin-top:2px}
.rpt2-eval-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rpt2-eval-card{background:#f8f9ff;border-radius:10px;padding:12px}
.rpt2-eval-head{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.rpt2-book-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f0}
.rpt2-book-num{width:24px;height:24px;background:#1A3169;color:#C9A84C;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.rpt2-comment-card{border-left:4px solid #1A3169;border-radius:0 10px 10px 0;padding:14px;background:#f8f9ff}
.rpt2-comment-who{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.rpt2-comment-body{font-size:13px;line-height:1.8;color:#333;background:#fff;border-radius:8px;padding:12px}

/* ── SPEECH BUBBLE ── */
.bubble-wrap{display:flex;flex-direction:column;gap:16px}
.bubble-row{display:flex;align-items:flex-start;gap:10px}
.bubble-row.right{flex-direction:row-reverse}
.bubble-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-weight:700}
.bubble-avatar.navy{background:#1A3169;color:#fff}
.bubble-avatar.gold{background:#C9A84C;color:#fff}
.bubble-content{display:flex;flex-direction:column;max-width:85%}
.bubble-name{font-size:10px;font-weight:700;color:#888;margin-bottom:4px;letter-spacing:.3px;text-transform:uppercase}
.bubble-row.right .bubble-name{text-align:right}
.bubble-box{position:relative;padding:12px 16px;border-radius:18px;font-size:13px;line-height:1.8;color:#333}
.bubble-box.navy{background:#eef2ff;color:#1A3169;border:1.5px solid #1A3169;border-bottom-left-radius:4px}
.bubble-box.navy::before{content:"";position:absolute;left:-9px;bottom:10px;border:8px solid transparent;border-right-color:#1A3169;border-left:0;border-bottom:0}
.bubble-box.gold{background:#fffdf0;border:1.5px solid #C9A84C;border-bottom-right-radius:4px}
.bubble-box.gold::before{content:"";position:absolute;right:-9px;bottom:10px;border:8px solid transparent;border-left-color:#C9A84C;border-right:0;border-bottom:0}
.bubble-date{font-size:10px;color:#bbb;margin-top:4px}
.bubble-row.right .bubble-date{text-align:right}
.rpt2-footer{text-align:center;font-size:11px;color:#aaa;padding:16px;border-top:1px solid #e8e0d0;display:flex;justify-content:space-between}
@media(max-width:700px){
  .rpt2-kpi-grid{grid-template-columns:1fr 1fr}
  .rpt2-eval-grid{grid-template-columns:1fr}
}
@media print{
  body{height:auto!important;overflow:visible!important}
  .rpt-wrap{max-width:100%!important;margin-bottom:6px!important}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}

  /* 헤더 */
  .rpt2-header{padding:12px 18px!important;margin-bottom:8px!important;border-radius:8px!important}

  /* 섹션 공통 */
  .rpt2-section{box-shadow:none!important;border:1px solid #e8ecf2!important;padding:10px 14px!important;margin-bottom:6px!important}
  .rpt2-section-title{font-size:11px!important;margin-bottom:6px!important;padding-bottom:4px!important;letter-spacing:0!important}

  /* 성적 테이블 */
  table{font-size:11px!important}
  td,th{padding:5px 6px!important}

  /* 2페이지 강제 분리 */
  [style*="break-before:page"],[style*="page-break-before:always"]{
    page-break-before:always!important;
    break-before:page!important;
  }
}

/* ── SEARCH CLEAR ── */
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap input{width:100%;padding-right:28px}
.search-clear{position:absolute;right:8px;background:none;border:none;color:#aaa;font-size:16px;cursor:pointer;padding:0;line-height:1;display:none}
.search-clear.visible{display:block}

/* ── CHART ── */
.chart-wrap{position:relative;height:220px;margin:10px 0}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h2{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:14px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid #e8ecf2}

/* ── LOGIN ── */
#login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#0f1f4e 0%,#1A3169 60%,#2a4a8a 100%)}
.login-box{background:#fff;border-radius:16px;padding:32px;width:320px;box-shadow:0 12px 40px rgba(0,0,0,.25);text-align:center}
.login-box img{width:80px;height:80px;border-radius:50%;background:var(--navy);padding:6px;margin-bottom:10px}
.login-box h1{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:4px}
.login-box p{font-size:12px;color:var(--gray);margin-bottom:20px}
.login-box select,.login-box input{width:100%;border:1px solid #d0d6e0;border-radius:8px;padding:10px 12px;font-size:14px;margin-bottom:10px;color:var(--navy)}
.login-box select:focus,.login-box input:focus{outline:none;border-color:var(--gold)}
.login-box button{width:100%;background:var(--navy);color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.login-box button:hover{background:#14276e}
.login-err{color:#e74c3c;font-size:12px;margin-top:6px;min-height:18px}

/* ── ATTENDANCE ── */


/* ── CONSULTATION ── */
.cons-item{border:1px solid #e0e4ec;border-radius:8px;padding:12px;margin-bottom:8px;position:relative}
.cons-item .cons-date{font-size:11px;color:var(--gray);margin-bottom:4px}
.cons-item .cons-type{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#eef2ff;color:var(--navy);margin-bottom:6px}
.cons-item .cons-text{font-size:13px;line-height:1.6}
.cons-item .cons-del{position:absolute;top:8px;right:8px}

/* ── TRANSFER HISTORY ── */
.hist-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12px;color:#4a5a7a;border-bottom:1px solid #f0f0f0}
.hist-arrow{color:var(--gold);font-weight:700}

/* ── BOOK ITEM ── */
.book-item{display:flex;gap:8px;align-items:center;margin-bottom:6px;padding:8px 10px;background:#f8f9ff;border-radius:6px;border:1px solid #e8ecf2}
.book-item input{flex:1;border:1px solid #d0d6e0;border-radius:4px;padding:5px 8px;font-size:12px}
.book-pct{width:60px}
.book-del{background:none;border:none;cursor:pointer;color:#e74c3c;font-size:16px;padding:0 4px}

/* ── DEADLINE BADGE ── */
.deadline-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:10px}
.deadline-ok{background:#d4edda;color:#155724}
.deadline-warn{background:#fff3cd;color:#856404}
.deadline-over{background:#f8d7da;color:#721c24}

/* ── BREADCRUMB ── */
#breadcrumb{z-index:50}
.bc-link{color:var(--gray);cursor:pointer;padding:2px 4px;border-radius:4px;transition:all .15s}
.bc-link:hover{color:var(--navy);background:#f0f4ff}
.bc-sep{color:#ccc;margin:0 2px}

/* ── PRINT ── */
@keyframes slideUp{
  from{transform:translateY(100%);opacity:0}
  to{transform:translateY(0);opacity:1}
}
@media print{
  #topbar,#sidebar,#past-notice,#breadcrumb,.no-print{display:none!important}
  .rpt-print-main,.rpt-print-graph{display:block!important}
  #main{padding:0;overflow:visible}
  body{height:auto;overflow:visible}
  #layout{height:auto;overflow:visible}
  .card{box-shadow:none;border:1px solid #ddd}
}

/* ── MOBILE ── */
@media(max-width:700px){
  body{overflow:auto;-webkit-text-size-adjust:100%}
  #layout{flex-direction:column;overflow:visible}
  #sidebar{display:none}
  #main{padding:8px 8px 70px;overflow:visible}

  /* 탑바 */
  #topbar{padding:0 8px;height:48px;gap:6px}
  #topbar .logo-area span{display:none}
  #topbar .logo-area{gap:4px}
  .month-nav{margin:0 auto}
  .month-nav span{min-width:72px;font-size:12px}
  .month-nav button{width:26px;height:26px;font-size:14px}
  #topbar .right-btns button{padding:4px 8px;font-size:11px}

  /* 로그인 */
  .login-box{width:92vw;max-width:340px;padding:24px 20px}
  .login-box h1{font-size:16px}
  .login-box select,.login-box input{font-size:15px;padding:11px 12px}
  .login-box button{padding:13px;font-size:16px}

  /* 카드 */
  .card{padding:12px 10px;border-radius:10px;margin-bottom:10px}
  .card h3{font-size:13px;margin-bottom:10px}

  /* 통계 */
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .stat-box{padding:10px 6px}
  .stat-box .num{font-size:20px}
  .stat-box .lbl{font-size:10px}

  /* 학생 목록 */
  .stu-item{padding:10px 10px;border-radius:8px;gap:8px}
  .stu-avatar{width:36px;height:36px;font-size:13px;flex-shrink:0}
  .stu-name{font-size:13px}

  /* 탭 — 가로 스크롤 */
  .tab-bar{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap;
    padding-bottom:0;gap:0;border-bottom:2px solid #e8ecf2;scrollbar-width:none}
  .tab-bar::-webkit-scrollbar{display:none}
  .tab-btn{padding:9px 11px;font-size:11px;white-space:nowrap;flex-shrink:0}

  /* 별점 */
  .star{font-size:24px}
  .star-row{flex-wrap:wrap;gap:2px}
  .star-row label{min-width:80px;font-size:11px;flex:0 0 100%;margin-bottom:2px}
  .stars{flex-wrap:nowrap}



  /* 폼 */
  .form-group input,.form-group select{font-size:15px;padding:11px 10px}
  .form-group textarea{font-size:14px;padding:10px}

  /* 버튼 — 모바일 터치 최적화 */
  .btn{min-height:38px;font-size:13px;touch-action:manipulation}
  .btn-sm{min-height:34px;padding:6px 11px;font-size:12px}
  .btn-xs{min-height:30px;padding:4px 9px;font-size:11px}

  /* 모달 */
  .overlay{padding:10px;align-items:flex-end}
  .modal{border-radius:16px 16px 12px 12px;max-height:88vh;padding:16px 14px}
  .modal h2{font-size:15px}
  .modal-footer{gap:8px;flex-wrap:wrap}
  .modal-footer .btn{flex:1;justify-content:center;min-height:42px}

  /* 브레드크럼 */
  #breadcrumb{font-size:11px;padding:5px 8px}

  /* 진도 그리드 */
  .book-item{flex-wrap:wrap;gap:6px}

  /* 성적 */
  .score-pair input{width:54px;font-size:14px}

  /* 하단 네비게이션 */
  #mobile-nav{display:flex}

  /* 반별평가 영역 모바일 */
  .eval-domain{padding:10px}
  .eval-domain-header{flex-direction:column;align-items:flex-start;gap:4px}

  /* 상담 인라인 폼 그리드 */
  #cons-detail [style*="grid-template-columns:1fr 1fr 1fr"]{
    grid-template-columns:1fr 1fr!important
  }

  /* 학생 입력 헤더 */
  #main [style*="display:flex;align-items:center;gap:10px;margin-bottom:14px"]{
    flex-wrap:wrap;gap:6px
  }
}
@media(min-width:701px){
  #mobile-nav{display:none!important}
}
@media(min-width:900px){
  #main{padding:20px}
  #sidebar{width:210px}
}

/* ── 모바일 하단 네비게이션 ── */
#mobile-nav{
  position:fixed;bottom:0;left:0;right:0;height:56px;
  background:#fff;border-top:1px solid #e0e4ec;
  flex-direction:row;align-items:center;justify-content:space-around;
  z-index:200;padding:0 4px;
  box-shadow:0 -2px 8px rgba(0,0,0,.08);
}
.mob-nav-btn{
  display:flex;flex-direction:column;align-items:center;
  gap:2px;padding:4px 8px;cursor:pointer;
  font-size:10px;color:var(--gray);border:none;background:none;
  border-radius:8px;transition:color .15s;flex:1;
}
.mob-nav-btn .icon{font-size:20px}
.mob-nav-btn.active{color:var(--navy);font-weight:700}
/* 모바일일 때 하단 여백 */
@media(max-width:700px){
  #layout{padding-bottom:56px}
}
</style>
</head>

function getMaxMonth(){return new Date().toISOString().slice(0,7);}
function fmtMonth(m){const[y,mo]=m.split("-");return y+"년 "+(+mo)+"월";}
function addMonth(m,d){const dt=new Date(m+"-01");dt.setMonth(dt.getMonth()+d);return dt.toISOString().slice(0,7);}
function isPast(){return curMonth<getMaxMonth();}
function activeStudents(){return Object.values(students).filter(s=>s.status!=="withdrawn");}
function classStu(cls){return activeStudents().filter(s=>s.cls===cls);}
function getMD(id){return (students[id]?.monthlyData||{})[curMonth]||{};}

function getDeadline(cls){
  return ((settings.classProgress||{})[cls]||{})[curMonth]?.deadline||null;
}
function isLocked(cls){
  if(user.role==="admin")return false;
  // 월별 마감 체크
  if(isMonthClosed(curMonth)) return true;
  const dl=getDeadline(cls);
  if(!dl)return false;
  return new Date()>new Date(dl+"T23:59:59");
}
function getClassAvg(cls,field){
  const stus=classStu(cls);
  const vals=stus.map(s=>{
    const md=(s.monthlyData||{})[curMonth]||{};
    if(field==="sr"){
      // 신버전: sr.ge (Grade Equivalent)
      const ge=parseFloat(md.sr?.ge||"");
      if(!isNaN(ge)&&ge>0) return ge;
      // 구버전 호환
      return md.sr?.score&&md.sr?.maxScore?(md.sr.score/md.sr.maxScore*100):null;
    }
    if(field==="curr"){
      // subjects 기반 평균
      if(md.subjects){
        const subjVals=Object.values(md.subjects).map(d=>d.score&&d.max?Math.round(d.score/d.max*100):null).filter(v=>v!==null);
        if(subjVals.length) return subjVals.reduce((a,b)=>a+b,0)/subjVals.length;
      }
      return md.currTest?.score&&md.currTest?.maxScore?(md.currTest.score/md.currTest.maxScore*100):null;
    }
    if(field==="eval")return calcEvalTotal(md.eval);
    return null;
  }).filter(v=>v!==null);
  if(!vals.length)return null;
  return (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
}
function calcEvalTotal(eval_data){
  if(!eval_data)return null;
  const scores=EVAL_DOMAINS.map(d=>{
    const v=(eval_data[d.key]?.items)?.[0]||0;
    return v>0?v:null;
  }).filter(v=>v!==null);
  if(!scores.length)return null;
  return scores.reduce((a,b)=>a+b,0)/scores.length;
}
function calcDomainScore(items){
  const filled=(items||[]).filter(v=>v>0);
  if(!filled.length)return 0;
  return filled.reduce((a,b)=>a+b,0)/filled.length;
}
function hasStuScore(md){
  // subjects 방식(신) 또는 sr 방식(구) 중 하나라도 있으면 OK
  const hasSubj=md.subjects&&Object.values(md.subjects).some(d=>d.score&&d.max);
  const hasSR=md.sr?.ss||md.sr?.pr;
  return !!(hasSubj||hasSR);
}
function stuCompletionPct(id){
  const md=getMD(id);
  let score=0,total=4;
  if(hasStuScore(md))score++;

  if(md.eval)score++;
  if(md.books?.length&&md.books.some(b=>b.completedUnits>0||b.pct>0))score++;
  if(md.teacherComment)score++;
  return Math.round(score/total*100);
}
function stuMissingItems(id){
  const md=getMD(id);
  const missing=[];
  if(!hasStuScore(md)) missing.push("성적");

  if(!md.eval) missing.push("영역평가");
  if(!(md.books?.length&&md.books.some(b=>b.completedUnits>0||b.pct>0))) missing.push("진도");
  if(!md.teacherComment) missing.push("코멘트");
  return missing;
}
function stuBadge(id){
  const pct=stuCompletionPct(id);
  if(pct===100)return '<span class="badge badge-done">완료</span>';
  if(pct>0){
    const missing=stuMissingItems(id);
    const chips=missing.map(m=>`<span style="display:inline-block;background:#fff3e0;color:#e65100;border:1px solid #ffcc80;border-radius:4px;font-size:9px;padding:1px 5px;font-weight:600">${m}</span>`).join("");
    return `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px"><span class="badge badge-wip">입력중</span><div style="display:flex;gap:2px;flex-wrap:wrap;justify-content:flex-end">${chips}</div></div>`;
  }
  return '<span class="badge badge-none">미입력</span>';
}

async function migrateOriozToOrion(){

    const data=snap.val()||{};
    const updates={};
    // 학생 cls 필드 수정
    Object.entries(data).forEach(([id,s])=>{
      if(s.cls==="Orioz")       updates[`students/${id}/cls`]="Orion";
      if(s.bg===DEFAULT_CLS_COLOR["Orioz"]) updates[`students/${id}/bg`]=DEFAULT_CLS_COLOR["Orion"]||s.bg;
    });
    // settings/classProgress Orioz 키 → Orion으로 이동
    const setSnap=await db.ref("settings/classProgress/Orioz").once("value");
    const oriozProg=setSnap.val();
    if(oriozProg){
      updates["settings/classProgress/Orion"]=oriozProg;
      updates["settings/classProgress/Orioz"]=null;
    }
    // settings/pins Orioz → Orion
    const pinSnap=await db.ref("settings/pins/Orioz").once("value");
    const oriozPin=pinSnap.val();
    if(oriozPin){
      updates["settings/pins/Orion"]=oriozPin;
      updates["settings/pins/Orioz"]=null;
    }
    // settings/teachers Orioz → Orion (교사/반 관리 사용 시)
    const tchrSnap=await db.ref("settings/classes/Orioz").once("value");
    const oriozCls=tchrSnap.val();
    if(oriozCls){
      updates["settings/classes/Orion"]=oriozCls;
      updates["settings/classes/Orioz"]=null;

      await db.ref().update(updates);

      await loadSettings();

  }
}

const SCR_LABELS={"th":"홈","home":"홈","inp":"학생 입력","rpt":"보고서","dash":"대시보드",
  "stus":"학생 관리","cons":"상담 관리","prog":"반별 진도","arpt":"보고서 목록","cfg":"설정"};

function go(name,params={},resetStack=false){
  curScr={name,params};
  if(params.id) selId=params.id;
  else selId=null;
  thFilter="all";
  // cons 탭이 아닌 다른 탭으로 이동하면 상담 선택 상태 초기화
  if(name!=="cons") consSelId=null;
  // 현재 화면 상태 sessionStorage에 저장 (새로고침 복원용)
  try{
    const saved=sessionStorage.getItem("petamus_session");
    if(saved){
      const sess=JSON.parse(saved);
      sess.scr={name,params};
      sess.month=curMonth;
      if(user?.viewCls) sess.viewCls=user.viewCls;
      sessionStorage.setItem("petamus_session",JSON.stringify(sess));
    }
  }catch(e){}
  // Build navStack
  if(name==="login"||resetStack){
    navStack=[];
  } else if(name==="th"||name==="dash"||name==="home"||name==="arpt"){
    navStack=[{name,params,label:name==="th"?(user.role==="admin"?(user.viewCls||CLS[0])+" 반":"홈"):(name==="home"?"홈":name==="arpt"?"보고서 목록":"대시보드")}];
  } else {
    // Don't duplicate last item
    const last=navStack[navStack.length-1];
    let lbl=SCR_LABELS[name]||name;
    if(name==="inp"&&params.id&&students[params.id])lbl=students[params.id].name;
    if(name==="rpt"&&params.id&&students[params.id])lbl=students[params.id].name+" 보고서";
    if(!last||last.name!==name||JSON.stringify(last.params)!==JSON.stringify(params)){
      navStack.push({name,params,label:lbl});
    }
  }
  
  if(name!=="login"){
    document.getElementById("topbar").style.display="flex";
    document.getElementById("layout").style.display="flex";
    if(window.innerWidth>700) document.getElementById("sidebar").style.display="flex";
    document.getElementById("past-notice").style.display=isPast()?"block":"none";
    document.getElementById("breadcrumb").style.display=navStack.length>1?"flex":"none";
  } else {
    document.getElementById("topbar").style.display="none";
    document.getElementById("layout").style.display="none";
    document.getElementById("past-notice").style.display="none";
    document.getElementById("breadcrumb").style.display="none";
    document.getElementById("login-wrap").style.display="flex";
    navStack=[];
  }
  
  renderBreadcrumb();
  renderScr(name,params);
  updSB(name);
}

function renderBreadcrumb(){
  const bc=document.getElementById("breadcrumb");
  if(!bc)return;
  if(navStack.length<=1){bc.style.display="none";return;}
  bc.style.display="flex";
  bc.innerHTML=navStack.map((item,i)=>{
    const isLast=i===navStack.length-1;
    if(isLast)return `<span style="color:var(--navy);font-weight:600">${item.label}</span>`;
    return `<span class="bc-link" onclick="goStack(${i})">${item.label}</span><span class="bc-sep">›</span>`;
  }).join("");
}

function goStack(idx){
  const item=navStack[idx];
  navStack=navStack.slice(0,idx+1);
  curScr={name:item.name,params:item.params};
  if(item.params?.id)selId=item.params.id;
  thFilter="all";
  renderBreadcrumb();
  renderScr(item.name,item.params);
  updSB(item.name);
}

function goBack(){
  if(navStack.length<2)return;
  navStack.pop();
  const item=navStack[navStack.length-1];
  curScr={name:item.name,params:item.params};
  if(item.params?.id)selId=item.params.id;
  thFilter="all";
  renderBreadcrumb();
  renderScr(item.name,item.params);
  updSB(item.name);
}

function updSB(active){
  document.querySelectorAll(".sb-item").forEach(el=>{
    const scr=el.getAttribute("data-scr");
    el.classList.toggle("active",scr===active||
      (active==="home"&&scr==="home")||
      (active.startsWith("cls:")&&scr===active)||
      (active==="inp"&&scr==="th")||
      (active==="inp"&&scr===("cls:"+(user.viewCls||user.cls)))||
      (active==="rpt"&&scr==="arpt")
    );
  });
  updateMobileNav(active);
}

const SKILLS=["listening","speaking","reading","writing"];
const SKO={listening:"리스닝",speaking:"스피킹",reading:"리딩",writing:"라이팅"};
const SICO={listening:"🎧",speaking:"🗣️",reading:"📖",writing:"✍️"};
const SCOL={listening:"#1565C0",speaking:"#2E7D32",reading:"#E65100",writing:"#6A1B9A"};

function scorePct(score,max){
  if(!score||!max||isNaN(score)||isNaN(max))return null;
  return (parseFloat(score)/parseFloat(max)*100).toFixed(1);
}
function getClassSkillAvg(cls,field,skill){
  const stus=classStu(cls);
  const vals=stus.map(s=>{
    const md=(s.monthlyData||{})[curMonth]||{};
    const d=md[field]||{};
    if(skill){
      return d[skill]?.score&&d[skill]?.maxScore?(d[skill].score/d[skill].maxScore*100):null;
    }
    return d.total?.score&&d.total?.maxScore?(d.total.score/d.total.maxScore*100):null;
  }).filter(v=>v!==null);
  if(!vals.length)return null;
  return (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
}

function skillInputRow(prefix,sk,data,dis){
  const sc=data[sk]?.score||"";
  const mx=data[sk]?.maxScore||"";
  const pct=scorePct(sc,mx);
  return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f5">
    <span style="min-width:70px;font-size:12px;color:${SCOL[sk]};font-weight:600">${SICO[sk]} ${SKO[sk]}</span>
    <input type="number" id="${prefix}-${sk}-sc" value="${sc}" ${dis} placeholder="점수"
      style="width:60px;border:1px solid #d0d6e0;border-radius:4px;padding:4px 6px;font-size:12px;text-align:center"
      oninput="autoCalcTotal('${prefix}')">
    <span style="color:var(--gray);font-size:12px">/</span>
    <input type="number" id="${prefix}-${sk}-mx" value="${mx}" ${dis} placeholder="만점"
      style="width:60px;border:1px solid #d0d6e0;border-radius:4px;padding:4px 6px;font-size:12px;text-align:center"
      oninput="autoCalcTotal('${prefix}')">
    ${pct?`<span class="avg-chip">${pct}%</span>`:""}
  </div>`;
}

function autoCalcTotal(prefix){
  let totalScore=0, totalMax=0, hasAny=false;
  SKILLS.forEach(sk=>{
    const sc=parseFloat(document.getElementById(prefix+"-"+sk+"-sc")?.value)||0;
    const mx=parseFloat(document.getElementById(prefix+"-"+sk+"-mx")?.value)||0;
    if(sc>0||mx>0){totalScore+=sc;totalMax+=mx;hasAny=true;}
  });
  if(hasAny){
    const scEl=document.getElementById(prefix+"-sc");
    const mxEl=document.getElementById(prefix+"-mx");
    if(scEl&&!scEl.value)scEl.value=totalScore||"";
    if(mxEl&&!mxEl.value)mxEl.value=totalMax||"";
  }
}

async function renderBooksTabAsync(id){

  if(!settings.classProgress[cls]) settings.classProgress[cls]={};
  if(!settings.classProgress[cls][curMonth]) settings.classProgress[cls][curMonth]={};

  // #books-list 만 업데이트 (AR READING은 건드리지 않음)

    const savedBooks=md.books||[];
    const books=clsBooks.map(cb=>{
      const saved=savedBooks.find(sb=>sb.title===cb.title);
      const completedUnits=saved?saved.completedUnits:(cb.completedUnits||0);
      return {title:cb.title,totalUnits:cb.totalUnits||0,completedUnits};
    });
    const displayBooks=books.length?books:savedBooks.map(b=>({title:b.title,totalUnits:b.totalUnits||0,completedUnits:b.completedUnits||b.pct||0}));
    const dis=locked&&user.role!=="admin";
    booksList.innerHTML=displayBooks.map((b,i)=>renderBookItem(b,i,dis)).join("");
  } else if(!document.getElementById("inp-body")){
    inpTab=2;
    renderInp(id);
  }
}

function renderBookItem(b,i,dis){
  const pct=b.totalUnits>0?Math.round((b.completedUnits||0)/b.totalUnits*100):0;
  const barColor=pct>=80?"var(--green)":pct>=50?"var(--gold)":"var(--navy)";
  const bg=i%2===0?"#fff":"#f8f9ff";
  return `<div id="book-${i}" style="background:${bg};padding:8px 10px;border-bottom:1px solid #f0f2f8">
    <div style="display:grid;grid-template-columns:1fr 70px 70px 60px;gap:6px;align-items:center">
      <div style="font-size:13px;font-weight:600">${b.title||""}</div>
      <div style="text-align:center;font-size:13px;color:var(--gray)">${b.totalUnits||"-"}단원</div>
      <div style="text-align:center">
        ${dis
          ? `<span style="font-size:13px;font-weight:700">${b.completedUnits||0}</span>`
          : `<input type="number" id="book-done-${i}" value="${b.completedUnits||0}" min="0" max="${b.totalUnits||999}"
              onchange="updateBookPct(${i},${b.totalUnits||0})"
              style="width:60px;border:1px solid #d0d6e0;border-radius:6px;padding:5px;font-size:13px;text-align:center;font-weight:700">`
        }
      </div>
      <div id="book-pct-display-${i}" style="text-align:center;font-size:13px;font-weight:700;color:${barColor}">${pct}%</div>
    </div>
    <div style="background:#e8ecf2;border-radius:4px;height:4px;margin-top:6px">
      <div id="book-bar-${i}" style="background:${barColor};height:4px;border-radius:4px;width:${pct}%;transition:width .3s"></div>
    </div>
  </div>`;
}
function updateBookPct(i,totalUnits){
  const done=parseInt(document.getElementById("book-done-"+i)?.value)||0;
  const pct=totalUnits>0?Math.round(done/totalUnits*100):0;
  const barColor=pct>=80?"var(--green)":pct>=50?"var(--gold)":"var(--navy)";
  const pctEl=document.getElementById("book-pct-display-"+i);
  const barEl=document.getElementById("book-bar-"+i);
  if(pctEl){pctEl.textContent=pct+"%";pctEl.style.color=barColor;}
  if(barEl){barEl.style.width=pct+"%";barEl.style.background=barColor;}
}

async function saveBooks(id){
  const s=students[id];
  const cls=s?.cls||"";
  const clsBooks=((settings.classProgress||{})[cls]||{})[curMonth]?.books||[];
  const books=[];
  let i=0;
  while(document.getElementById("book-"+i)){
    const clsBook=clsBooks[i]||{};
    const completedUnits=parseInt(document.getElementById("book-done-"+i)?.value)||0;
    const totalUnits=clsBook.totalUnits||0;
    const pct=totalUnits>0?Math.round(completedUnits/totalUnits*100):0;
    books.push({title:clsBook.title||"", totalUnits, completedUnits, pct});
    i++;
  }
  const lines=books.map(b=>`📖 ${b.title||"교재"}: <b>${b.completedUnits} / ${b.totalUnits}</b>단원 (${b.pct}%)`);
  if(!lines.length){showToast("저장할 교재가 없습니다");return;}
  confirmSavePopup("📚 진도 저장",lines,async()=>{
    await saveStudentMD(id,{books});

  });
}

function genAIDraft(id){
  const s=students[id];
  const md=getMD(id);
  const subj=md.subjects||{};
  const ev=md.eval||{};
  const books=md.books||[];

  // 과목 성적 분석
  const clsSubs=getClsSubjects(s.cls);
  const subjResults=clsSubs.map(sub=>{
    const d=subj[sub.key]||{};
    const pct=d.score&&d.max?Math.round(d.score/d.max*100):null;
    return {label:sub.label, score:d.score, max:d.max, pct, comment:d.comment||""};
  }).filter(r=>r.pct!==null);

  const allPcts=subjResults.map(r=>r.pct);
  const avgPct=allPcts.length?Math.round(allPcts.reduce((a,b)=>a+b,0)/allPcts.length):null;
  const best=subjResults.length?subjResults.reduce((a,b)=>a.pct>b.pct?a:b):null;
  const worst=subjResults.length?subjResults.reduce((a,b)=>a.pct<b.pct?a:b):null;

  // 영역 평가
  const evalTotal=calcEvalTotal(ev);
  const evalDetails=EVAL_DOMAINS.map(d=>{
    const sc=calcDomainScore((ev[d.key]?.items)||[]);
    return sc>0?{label:d.label,score:sc}:null;
  }).filter(Boolean);
  const evalBest=evalDetails.length?evalDetails.reduce((a,b)=>a.score>b.score?a:b):null;
  const evalWorst=evalDetails.length?evalDetails.reduce((a,b)=>a.score<b.score?a:b):null;

  // 진도
  const booksDone=books.filter(b=>b.pct>=80);
  const booksProgress=books.filter(b=>b.pct>0&&b.pct<80);

  // ── 초안 생성 ──
  let draft=`${s.name} 학생(${s.ename})의 ${fmtMonth(curMonth)} 학습 결과를 안내드립니다.

`;

  // 성적 섹션
  if(subjResults.length){
    draft+=`【학습 성취】
`;
    subjResults.forEach(r=>{
      const grade=r.pct>=90?"A":r.pct>=80?"B":r.pct>=70?"C":r.pct>=60?"D":"F";
      draft+=`• ${r.label}: ${r.score}/${r.max}점 (${r.pct}% · ${grade})`;
      if(r.comment) draft+=` — ${r.comment}`;
      draft+=`
`;
    });
    if(avgPct!==null) draft+=`▶ 전체 평균: ${avgPct}%
`;
    if(best&&worst&&best.label!==worst.label){
      draft+=`
`;
      draft+=`가장 우수한 과목은 ${best.label}(${best.pct}%)이며, `;
      draft+=`${worst.label}(${worst.pct}%)은 추가 집중이 필요합니다.
`;
    }
  }

  // 영역 평가 섹션
  if(evalDetails.length){
    draft+=`
【영역별 평가】
`;
    evalDetails.forEach(d=>{
      const stars="★".repeat(Math.round(d.score))+"☆".repeat(5-Math.round(d.score));
      draft+=`• ${d.label}: ${stars} (${d.score.toFixed(1)}/5.0)
`;
    });
    if(evalBest) draft+=`▶ ${evalBest.label} 영역에서 특히 우수한 모습을 보였습니다.
`;
    if(evalWorst&&evalWorst.score<3) draft+=`▶ ${evalWorst.label} 영역은 꾸준한 연습이 도움이 될 것입니다.
`;
  }

  // 진도 섹션
  if(books.length){
    draft+=`
【교재 진도】
`;
    books.forEach(b=>{
      if(b.title) draft+=`• ${b.title}: ${b.pct||0}% 완료
`;
    });
  }

  // 종합 코멘트
  draft+=`
이번 달 ${s.name} 학생은 `;
  if(avgPct>=90) draft+=`전과목에서 탁월한 성취를 보여주었습니다. 지속적인 노력에 박수를 보냅니다.`;
  else if(avgPct>=80) draft+=`전반적으로 우수한 학습 태도와 성취를 보여주었습니다.`;
  else if(avgPct>=70) draft+=`꾸준히 노력하는 모습이 돋보였으며 성장 가능성이 충분합니다.`;
  else if(avgPct!==null) draft+=`기초를 다지는 시간이 필요하며, 가정에서의 복습을 권장드립니다.`;
  else draft+=`성실하게 수업에 참여하였습니다.`;
  draft+=`

(추가 관찰사항, 가정 연계 학습 권고 등을 여기에 보완해 주세요)`;

  const area=document.getElementById("ai-draft-area");
  area.innerHTML=`<div style="background:#f0f7ff;border:1px solid #bee3f8;border-radius:8px;padding:14px;margin-bottom:10px;font-size:12px;line-height:1.8">
    <div style="font-size:11px;font-weight:700;color:#2b6cb0;margin-bottom:8px">✨ AI 초안 (수정 후 사용하세요)</div>

  </div>`;
  area._draft=draft;
}

function getCurrentEvalData(domainKey, id){
  // setAttitude가 즉시 저장하므로 students 로컬 데이터에서 읽기
  const ev=(students[id]?.monthlyData?.[curMonth]?.eval)||{};
  return (ev[domainKey]?.items)||[0,0,0,0,0];
}

async function saveEval(id){
  const ev={};
  EVAL_DOMAINS.forEach(d=>{
    const items=getCurrentEvalData(d.key,id);
    const score=calcDomainScore(items);
    ev[d.key]={items,score};
  });
  const total=calcEvalTotal(ev);
  const lines=EVAL_DOMAINS.map(d=>{
    const sc=ev[d.key]?.score||0;
    const dom=EVAL_DOMAINS.find(x=>x.key===d.key);
    return `${dom.icon} ${dom.label}: <b>${sc>0?sc.toFixed(1):"-"}</b> / 5.0`;
  });
  lines.push(`<span style="color:var(--navy);font-weight:700">📊 종합: ${total?total.toFixed(1):"-"} / 5.0</span>`);
  confirmSavePopup("🎯 영역별 평가 저장", lines, async()=>{
    await saveStudentMD(id,{eval:ev});
    showToast("영역별 평가 저장 완료 ✓");
    renderInp(id);
  });
}

async function saveSR(id){
  const md=getMD(id);
  const existingDate=(md.sr||{}).date||"";
  const rawDate=document.getElementById("sr-date")?.value.trim()||"";
  // YYYY-MM-DD 형식 그대로 저장 (달력 input과 호환)
  const date=rawDate||existingDate;
  const ss=document.getElementById("sr-ss")?.value.trim()||"";
  const pr=document.getElementById("sr-pr")?.value.trim()||"";
  const ge=document.getElementById("sr-ge")?.value.trim()||"";
  const irl=document.getElementById("sr-irl")?.value.trim()||"";
  if(!ss&&!pr){showToast("SR 점수를 입력하세요");return;}
  const lines=[
    `Scale Score: <b>${ss}</b>`,
    `Percentile Rank: <b>${pr}</b>`,
    ge?`Grade Equiv.: <b>${ge}</b>`:"",
    irl?`IRL: <b>${irl}</b>`:"",
    date?`Test Date: <b>${date}</b>`:""
  ].filter(Boolean);
  confirmSavePopup("📋 SR 저장",lines,async()=>{
    await saveStudentMD(id,{sr:{date,ss:ss?+ss:null,pr:pr?+pr:null,ge,irl}});
    showToast("SR 저장 완료 ✓");
    renderInp(id);
  });
}

function fmtSrDate(d){
  if(!d) return "—";
  if(typeof d==="string"&&d.match(/^\d{4}-\d{2}-\d{2}$/)){
    const dt=new Date(d+"T00:00:00");
    return dt.toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  }
  return d;
}
function gradeLabel(pct){
  if(!pct) return "—";
  if(pct>=93)return"A";if(pct>=90)return"A-";
  if(pct>=87)return"B+";if(pct>=83)return"B";if(pct>=80)return"B-";
  if(pct>=77)return"C+";if(pct>=73)return"C";if(pct>=70)return"C-";
  if(pct>=60)return"D";return"F";
}
function updateSubjAvg(subKey, id){
  const s=students[id];
  if(!s) return;
  const cls=s.cls;
  const myInput=document.getElementById("subj-"+subKey+"-score");
  const maxInput=document.getElementById("subj-"+subKey+"-max");
  const myScore=myInput?parseFloat(myInput.value)||0:0;
  const myMax=maxInput?parseFloat(maxInput.value)||100:100;

  // 반 평균 재계산
  const vals=classStu(cls).map(st=>{
    if(st===s) return myScore>0?myScore:null;
    return (((st.monthlyData||{})[curMonth]||{}).subjects||{})[subKey]?.score||null;
  }).filter(v=>v>0);
  const avgEl=document.getElementById("subj-avg-"+subKey);
  if(avgEl){
    if(!vals.length){ avgEl.innerHTML='<span style="color:#ccc">—</span>'; }
    else{
      const avg=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
      const color=myScore&&myScore>=avg?"#2e7d32":"#e65100";
      avgEl.innerHTML=`<span style="color:${color}">${avg}</span>`;
    }
  }

  // grade 실시간 갱신
  const gradeEl=document.getElementById("subj-grade-"+subKey);
  if(gradeEl){
    const pct=myMax>0?Math.round(myScore/myMax*100):0;
    const grade=gradeLabel(pct);
    const color=pct>=80?"#2e7d32":pct>=60?"#e65100":"#c0392b";
    gradeEl.textContent=grade;
    gradeEl.style.color=color;
  }
}

function resetScoreInputs(id){
  const md=getMD(id);
  const s2=students[id];
  const subj=md.subjects||{};
  getClsSubjects(s2?.cls||"").forEach(sub=>{
    const d=subj[sub.key]||{};
    const scoreEl=document.getElementById("subj-"+sub.key+"-score");
    const maxEl=document.getElementById("subj-"+sub.key+"-max");
    if(scoreEl) scoreEl.value=d.score||"";
    if(maxEl) maxEl.value=d.max||100;
    updateSubjAvg(sub.key,id);
  });
  // SR도 되돌리기
  const sr=md.sr||{};
  const fields=["ss","pr","ge","irl","date"];
  fields.forEach(f=>{
    const el=document.getElementById("sr-"+f);
    if(el) el.value=sr[f]||"";
  });
  showToast("입력값을 저장된 값으로 되돌렸습니다 ↩");
}

async function saveScore(id){
  const subjects={};
  const lines=[];
  const sstuCls=students[id]?.cls||"";
  getClsSubjects(sstuCls).forEach(s=>{
    const rawScore=document.getElementById("subj-"+s.key+"-score")?.value;
    const rawMax=document.getElementById("subj-"+s.key+"-max")?.value;
    const score=rawScore!==""&&rawScore!==null?parseFloat(rawScore):null;
    const max=rawMax!==""&&rawMax!==null?parseFloat(rawMax):100;
    const comment=document.getElementById("subj-"+s.key+"-cmt")?.value.trim()||"";
    if(score!==null&&score>=0){
      const pct=max>0?Math.round(score/max*100):0;
      subjects[s.key]={score,max,comment};
      lines.push(`${s.label}: <b>${score}/${max}</b> (${pct}%)`);
    }
  });
  if(!lines.length){showToast("입력된 점수가 없습니다");return;}
  confirmSavePopup("📊 성적 저장",lines,async()=>{
    // 기존 subjects에 새 데이터 병합 (입력 안 한 과목은 기존값 유지)
    const existing=(students[id]?.monthlyData?.[curMonth]?.subjects)||{};
    const merged={...existing,...subjects};
    await saveStudentMD(id,{subjects:merged});
    showToast("성적 저장 완료 ✓");
    renderInp(id);
  });
}

function renderScr(name,params={}){
  const id=params.id||selId;
  // 교사 role 접근 제한
  const teacherAllowed=["th","inp","rpt","arpt","cons"];
  if(user?.role==="teacher"&&!teacherAllowed.includes(name)){

  if(name==="th"){ renderTH(); return; }
  if(name==="home"){ renderHome(); return; }
  if(name==="inp"){ if(id)renderInp(id); return; }
  if(name==="rpt"){ if(id)renderRpt(id); return; }
  if(name==="dash"){ renderDash(); return; }
  if(name==="stus"){ renderStus(); return; }
  if(name==="tchr"){ renderTchrMgmt(); return; }
  if(name==="cons"){ if(!consSelId)consSelId=null; renderCons(); return; }
  if(name==="prog"){ renderProg(); return; }
  if(name==="subj"){ renderSubjMgmt(); return; }
  if(name==="arpt"){ renderARpt(); return; }
  if(name==="cfg"){ renderCfg(); return; }
}

async function deleteClass(cls){
  const cnt=Object.values(students).filter(s=>s.status!=="withdrawn"&&s.cls===cls).length;
  const msg=cnt>0
    ? `⚠️ "${cls}" 반에 재원생 ${cnt}명이 있습니다.\n반을 삭제하면 해당 반 정보(담임·레벨·색상)만 삭제됩니다.\n학생 데이터는 유지되며, 반 배정만 해제됩니다.\n\n삭제하시겠습니까?`
    : `"${cls}" 반을 삭제하시겠습니까?`;
  if(!confirm(msg)) return;

  // Firebase에서 반 설정 삭제 + 삭제 목록에 기록
  await db.ref("settings/classes/"+cls).remove();
  await db.ref("settings/teachers/"+cls).remove();
  await db.ref("settings/pins/"+cls).remove();
  await db.ref("settings/deletedCls/"+cls).set(true); // DEFAULT_CLS 재복원 방지

  // 로컬 상태 정리
  const idx=CLS.indexOf(cls);
  if(idx>-1) CLS.splice(idx,1);
  delete CLS_EMOJI[cls];
  delete CLS_COLOR[cls];
  delete CLS_LEVEL[cls];
  delete TCHR[cls];
  delete PINS[cls];

  await loadSettings();
  showConfirmToast(`"${cls}" 반이 삭제되었습니다`, "success");
  renderTchrMgmt();
}

async function deleteTchr(tchrId){
  const t=TEACHER_LIST[tchrId];
  if(!t)return;
  if(!confirm(`"${t.name}" 교사를 삭제하시겠습니까?\n${t.cls?"("+t.cls+" 담임 해제 포함)":""}`)) return;
  // 반 담임 해제
  if(t.cls){
    delete TCHR[t.cls];
    await db.ref("settings/teachers/"+t.cls).remove();
    await db.ref("settings/pins/"+t.cls).remove();
  }
  // 교사 목록에서 삭제
  delete TEACHER_LIST[tchrId];
  await db.ref("settings/teacherList/"+tchrId).remove();
  showConfirmToast(`"${t.name}" 교사가 삭제되었습니다`, "success");
  renderTchrMgmt();
}


async function saveClsModal(editCls){

  const level=customVal||document.getElementById("cls-level-select").value||"Lv.1";
  const name=document.getElementById("cls-name-val").value.trim();

  await db.ref("settings/classes/"+name).set(clsData);
  await db.ref("settings/deletedCls/"+name).remove(); // 삭제 목록에서 제거

  renderTchrMgmt();
}

async function saveTchrModal(tchrId){
  const name=document.getElementById("tchr-name-val").value.trim();
  const pin=document.getElementById("tchr-pin-val").value.trim();
  if(!name){alert("교사명을 입력해주세요.");return;}
  if(pin && !/^\d{4}$/.test(pin)){alert("PIN은 4자리 숫자여야 합니다.");return;}
  const id=tchrId||("tchr_"+Date.now());
  const existing=TEACHER_LIST[id]||{};
  const tchrData={name, pin:pin||existing.pin||"", cls:existing.cls||""};
  await db.ref("settings/teacherList/"+id).set(tchrData);
  TEACHER_LIST[id]=tchrData;
  // 반 배정된 경우 TCHR/PINS 동기화
  if(tchrData.cls){
    TCHR[tchrData.cls]=name;
    if(pin) PINS[tchrData.cls]=pin;
    await db.ref("settings/teachers/"+tchrData.cls).set({name});
    if(pin) await db.ref("settings/pins/"+tchrData.cls).set(pin);
  }
  document.getElementById("tchr-modal").remove();
  await loadSettings();
  showToast(isEdit?name+" 정보 수정 완료 ✓":name+" 교사 등록 완료 ✓");
  renderTchrMgmt();
}

async function confirmAssign(tchrId){
  const t=TEACHER_LIST[tchrId];
  const newCls=document.getElementById("assign-cls-val").value;
  // 기존 담임 충돌 확인
  if(newCls && TCHR[newCls] && TCHR[newCls]!==t.name){
    if(!confirm(`"${newCls}" 반에 이미 ${TCHR[newCls]} 선생님이 담임으로 배정되어 있습니다.\n${t.name} 선생님으로 교체하시겠습니까?`)) return;
    // 기존 담임의 cls 해제
    const prevTchrId=Object.keys(TEACHER_LIST).find(id=>TEACHER_LIST[id].cls===newCls&&id!==tchrId);
    if(prevTchrId){ TEACHER_LIST[prevTchrId].cls=""; await db.ref("settings/teacherList/"+prevTchrId+"/cls").set(""); }
  }
  // 기존 반 배정 해제
  if(t.cls && t.cls!==newCls){
    delete TCHR[t.cls];
    await db.ref("settings/teachers/"+t.cls).remove();
  }
  // 새 반 배정
  TEACHER_LIST[tchrId].cls=newCls;
  await db.ref("settings/teacherList/"+tchrId+"/cls").set(newCls);
  if(newCls){
    TCHR[newCls]=t.name;
    PINS[newCls]=t.pin;
    await db.ref("settings/teachers/"+newCls).set({name:t.name});
    await db.ref("settings/pins/"+newCls).set(t.pin);
  }
  document.getElementById("assign-modal").remove();
  await loadSettings();
  showConfirmToast(newCls?t.name+" → "+newCls+" 배정 완료":t.name+" 미배정으로 변경 완료", "success");
  renderTchrMgmt();
}

      const stuAvgs=stus.map(st=>{
        const subj=((st.monthlyData||{})[curMonth]||{}).subjects||{};
        const pcts=getClsSubjects(s.cls).map(sub=>{
          const d=subj[sub.key]||{};
          return d.score&&d.max?Math.round(d.score/d.max*100):null;
        }).filter(v=>v!==null);
        return pcts.length?pcts.reduce((a,b)=>a+b,0)/pcts.length:null;
      }).filter(v=>v!==null);
      return stuAvgs.length?Math.round(stuAvgs.reduce((a,b)=>a+b,0)/stuAvgs.length):null;
    })();
    const clsOverallColor=clsOverall!==null&&Math.round(overall)>=clsOverall?"#2e7d32":"#e65100";
    html+=`<tr style="background:#1A3169;border-top:2px solid #C9A84C">
      <td style="padding:9px 10px;color:#C9A84C;font-weight:800">OVERALL AVERAGE</td>
      <td style="padding:9px 8px;text-align:center;color:#fff;font-weight:800;font-size:15px">${Math.round(overall)}</td>
      <td style="padding:9px 8px;text-align:center;font-weight:700;font-size:13px;color:${clsOverall!==null?clsOverallColor:'#888'}">${clsOverall!==null?clsOverall:'—'}</td>
      <td style="padding:9px 8px;text-align:center;color:#C9A84C;font-weight:800">${gradeLabel(Math.round(overall))}</td>
    </tr>`;
  }

  html+=`</tbody></table></div>
    </div>

    <!-- ══ SR TEST RESULTS ══ -->
    ${renderRptSR(id,md)}

    <!-- ══ PERFORMANCE ANALYSIS ══ -->
    <div class="rpt2-section" style="break-inside:avoid;page-break-inside:avoid">
      <div class="rpt2-section-title">📈 PERFORMANCE ANALYSIS · Student Score vs. Class Average</div>
      <div style="position:relative;height:265px;margin-bottom:10px"><canvas id="rpt-main-bar"></canvas></div>
      <div style="display:grid;grid-template-columns:1fr 2.5fr;gap:8px">
        <div style="position:relative;height:245px"><canvas id="rpt-main-radar"></canvas></div>
        <div style="position:relative;height:245px"><canvas id="rpt-main-progress"></canvas></div>
      </div>
    </div>
  </div>`;

  html+=renderRptEval(ev);
  // 진도: 반 템플릿 + 학생 저장 데이터 병합 (renderBooksTab과 동일 로직)
  const clsBooks=((settings.classProgress||{})[s.cls]||{})[curMonth]?.books||[];
  const savedBooks=md.books||[];
  const mergedBooks=clsBooks.length
    ? clsBooks.map(cb=>{
        const saved=savedBooks.find(sb=>sb.title===cb.title);
        const completedUnits=saved?saved.completedUnits:(cb.completedUnits||0);
        return {title:cb.title,totalUnits:cb.totalUnits||0,completedUnits,
                pct:cb.totalUnits>0?Math.round(completedUnits/cb.totalUnits*100):0};
      })
    : savedBooks;
  html+=renderRptBooks(mergedBooks,md.arBooks||0);
  html+=renderRptComment(id,md);
  return html;
}

function renderRptEval(ev){
  const total=EVAL_DOMAINS.reduce((sum,d)=>{
    const v=(ev[d.key]?.items)?.[0]||0; return sum+v;
  },0);
  const maxTotal=EVAL_DOMAINS.length*5;
  const pct=maxTotal>0?Math.round(total/maxTotal*100):0;

  let html=`<div class="rpt-wrap"><div class="rpt2-section" style="break-before:page;page-break-before:always">
    <div class="rpt2-section-title">⭐ ATTITUDE & PARTICIPATION · ★ = 1 pt (5 pts max per category)</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">`;

  EVAL_DOMAINS.forEach((d,i)=>{
    const val=(ev[d.key]?.items)?.[0]||0;
    const stars=[1,2,3,4,5].map(n=>`<span style="color:${val>=n?"#f1c40f":"#ddd"};font-size:16px">★</span>`).join("");
    html+=`<div style="background:#f8f9ff;border-radius:8px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:12px;font-weight:700;color:#1A3169">${d.icon} ${d.label}</div>
      </div>
      <div style="text-align:right">
        <div>${stars}</div>
        <div style="font-size:12px;font-weight:700;color:${val>=4?"#2e7d32":val>=3?"#e65100":"#aaa"}">${val>0?val+" / 5":"미입력"}</div>
      </div>
    </div>`;
  });

  html+=`</div>
    <div style="background:#1A3169;color:#C9A84C;border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-weight:700">ATTITUDE TOTAL: ${total} / ${maxTotal}</span>
      <span style="font-size:18px;font-weight:800">${total>0?pct+"%":"—"}</span>
    </div>
  </div></div>`;
  return html;
}


function renderRptSR(id,md){
  const s=students[id];
  const sr=md.sr||{};
  const mds=s.monthlyData||{};
  // 월별 GE 데이터
  const months=Object.keys(mds).sort();
  const geData=months.map(m=>{ const v=parseFloat((mds[m]?.sr?.ge)||""); return isNaN(v)?null:v; });
  const hasChart=geData.some(v=>v!==null);

  if(!sr.ss&&!sr.pr&&!hasChart) return "";

  let html='<div class="rpt-wrap"><div class="rpt2-section"><div class="rpt2-section-title">📋 SR TEST RESULTS</div>';

  if(sr.ss||sr.pr){
    html+='<div style="font-size:11px;color:#C9A84C;margin-bottom:8px;font-weight:600">SR Test Date: <b>'+(fmtSrDate(sr.date))+'</b></div>'

      +'<th style="padding:6px 8px;text-align:center">Scale Score (SS)</th>'

      +'<td style="padding:8px;font-weight:800;font-size:15px">'+(sr.ss||"—")+'</td>'
      +'<td style="padding:8px;font-weight:800;font-size:15px">'+(sr.pr||"—")+'</td>'

  const md=mds[curMonth]||{};

  ["rpt-main-bar","rpt-main-radar","rpt-main-progress"].forEach(cid=>{

        x:{ticks:{font:{size:10,weight:"600"}},grid:{display:false}}
      }}});

        return d.score&&d.max?(d.score/d.max*100):null;
      }).filter(v=>v!==null);

        legend:{position:"bottom",labels:{boxWidth:8,font:{size:8},padding:2}}
      }}});
  }
  if(mainProgress&&window.Chart){

    const hLabels=clsS.map(s=>s.label);

      const d=(md.subjects||{})[sub.key]||{};
      return d.score&&d.max?Math.round(d.score/d.max*100):0;
    });
    const hClassAvg=clsS.map(sub=>{
      const stus=classStu(cls);
      const vals=stus.map(st=>{
        const d=((st.monthlyData||{})[curMonth]?.subjects||{})[sub.key]||{};
        return d.score&&d.max?(d.score/d.max*100):null;
      }).filter(v=>v!==null);
      return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
    });
    // 차이값 계산
    const hDiff=hPersonal.map((v,i)=>v-(hClassAvg[i]||0));
    // 반 평균 세로 마커 커스텀 플러그인
    const vLinePlugin={
      id:"vLinePlugin",
      afterDatasetsDraw(chart){
        const{ctx,scales:{x,y}}=chart;
        hClassAvg.forEach((avg,i)=>{
          const xPos=x.getPixelForValue(avg);
          const yTop=y.getPixelForValue(i)-y.height/(hLabels.length*2)*0.8;
          const yBottom=y.getPixelForValue(i)+y.height/(hLabels.length*2)*0.8;
          ctx.save();
          ctx.beginPath();
          ctx.strokeStyle="#C9A84C";
          ctx.lineWidth=2.5;
          ctx.moveTo(xPos,yTop);
          ctx.lineTo(xPos,yBottom);
          ctx.stroke();
          // 삼각형 마커
          ctx.fillStyle="#C9A84C";
          ctx.beginPath();
          ctx.moveTo(xPos-4,yTop-1);
          ctx.lineTo(xPos+4,yTop-1);
          ctx.lineTo(xPos,yTop+5);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
          // 점수 텍스트
          ctx.save();
          ctx.fillStyle="#333";
          ctx.font="bold 10px sans-serif";
          ctx.textAlign="left";
          const diff=hDiff[i];
          const sign=diff>=0?"+":"";
          const color=diff>=0?"#2e7d32":"#c0392b";
          ctx.fillText(hPersonal[i],xPos+6,y.getPixelForValue(i)+4);
          if(diff>0){
            ctx.fillStyle="#2e7d32";
            ctx.font="9px sans-serif";
            ctx.fillText(`(+${diff} vs avg)`,xPos+22,y.getPixelForValue(i)+4);
          }
          ctx.restore();
        });
      }
    };
    new Chart(mainProgress,{type:"bar",data:{
      labels:hLabels,
      datasets:[
        {label:"Student Score",data:hPersonal,backgroundColor:"#1A3169",borderColor:"#1A3169",borderWidth:0,borderRadius:2,barPercentage:0.65},
        {label:"Class Avg (background)",data:hClassAvg,backgroundColor:"rgba(201,168,76,.2)",borderColor:"transparent",borderWidth:0,borderRadius:2,barPercentage:0.65}
      ]
    },options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,
      plugins:{
        title:{display:false},
        legend:{
          position:"bottom",
          labels:{
            boxWidth:8,font:{size:8},padding:3,
            generateLabels:(chart)=>[
              {text:"Student Score",fillStyle:"#1A3169",strokeStyle:"#1A3169",lineWidth:1},
              {text:"Class Average (marker)",fillStyle:"#C9A84C",strokeStyle:"#C9A84C",lineWidth:2,lineDash:[]}
            ]
          }
        },
        tooltip:{callbacks:{
          label:(ctx)=>{
            if(ctx.datasetIndex===0){
              const diff=hDiff[ctx.dataIndex];
              const diffStr=diff>0?` (+${diff} vs avg)`:"";
              return ` ${ctx.label}: ${ctx.raw}${diffStr}`;
            }
            return null;
          }
        }}
      },
      layout:{padding:{right:40,top:2,bottom:2}},
      scales:{
        x:{min:0,max:100,ticks:{font:{size:9}},grid:{color:"#f0f0f0"}},
        y:{ticks:{font:{size:11,weight:"600"}},grid:{display:false}}
      }
    },plugins:[vLinePlugin]});
  }

  // ── SR 월별 추이 차트 ──
  const srTrendEl=document.getElementById("rpt-sr-trend");
  if(srTrendEl&&window.Chart){
    if(Chart.getChart(srTrendEl)) Chart.getChart(srTrendEl).destroy();
    const allMonths=Object.keys(mds).sort();
    // SR GE 데이터가 있는 월만 필터링
    const srMonths=allMonths.filter(m=>{ const v=parseFloat((mds[m]?.sr?.ge)||""); return !isNaN(v); });
    const srLabels=srMonths.map(m=>m.slice(2).replace("-","/"));
    const srGe=srMonths.map(m=>parseFloat((mds[m]?.sr?.ge)||""));
    const validCount=srGe.length;

    // 막대 위 숫자 표시 플러그인
    const barLabelPlugin={
      id:"barLabelPlugin",
      afterDatasetsDraw(chart){
        const{ctx,scales:{x,y}}=chart;
        chart.getDatasetMeta(0).data.forEach((bar,i)=>{
          const val=srGe[i];
          if(val===null) return;
          ctx.save();
          ctx.fillStyle="#1A3169";
          ctx.font="bold 12px sans-serif";
          ctx.textAlign="center";
          ctx.fillText(val.toFixed(1), bar.x, bar.y-6);
          ctx.restore();
        });
      }
    };

    const datasets=[
      {type:"bar",label:"SR",data:srGe,backgroundColor:"rgba(26,49,105,.2)",borderColor:"#1A3169",borderWidth:1.5,borderRadius:4,spanGaps:true,order:2}
    ];
    // 데이터가 2개 이상일 때만 꺾은선 추가
    if(validCount>=2){
      datasets.push({
        type:"line",label:"SR Trend",data:srGe,borderColor:"#C9A84C",backgroundColor:"transparent",borderWidth:2.5,
        pointRadius:5,pointBackgroundColor:"#fff",pointBorderColor:"#C9A84C",pointBorderWidth:2,
        tension:.35,spanGaps:true,order:1
      });
    }

    new Chart(srTrendEl,{
      type:"bar",
      data:{labels:srLabels,datasets},
      options:{responsive:true,maintainAspectRatio:false,spanGaps:true,
        layout:{padding:{top:24,bottom:2}},
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:i=>i.dataset.type==="line"?null:` SR GE: ${i.raw??"—"}`}}
        },
        scales:{
          y:{title:{display:true,text:"Grade Equivalent",font:{size:9}},ticks:{font:{size:9},callback:v=>v.toFixed(1)},grid:{color:"#f0f0f0"},suggestedMin:0},
          x:{ticks:{font:{size:10}},grid:{display:false}}
        }
      },
      plugins:[barLabelPlugin]
    });
  }

} // drawMainCharts 끝

// ── 탭1: 누적 그래프 차트 (반드시 display:block 상태에서 호출) ──
function drawHistoryCharts(id){
  const s=students[id];
  const mds=s.monthlyData||{};
  const months=Object.keys(mds).sort();
  const labels=months.map(m=>m.slice(2).replace("-","/"));
  if(!window.Chart) return;

  const el=document.getElementById("rpt-chart-history-score");
  if(el && Chart.getChart(el)) Chart.getChart(el).destroy();

  // GE 데이터만 추출
  const geData=months.map(m=>{
    const ge=(mds[m]?.sr?.ge)||null;
    // GE는 "3.6" 같은 문자열일 수 있으므로 float 변환
    const v=parseFloat(ge);
    return isNaN(v)?null:v;
  });
  const hasAny=geData.some(v=>v!==null);

  if(!el) return;

  if(!months.length||!hasAny){
    const ctx=el.getContext("2d");
    ctx.clearRect(0,0,el.width,el.height);
    ctx.fillStyle="#aaa";ctx.font="13px sans-serif";ctx.textAlign="center";
    ctx.fillText("SR GE 데이터가 없습니다",el.width/2||200,100);
    return;
  }

  new Chart(el,{
    type:"bar",
    data:{labels,datasets:[
      {type:"bar",label:"Grade Equivalent (GE)",data:geData,
        backgroundColor:"#1A316955",borderColor:"#1A3169",borderWidth:1.5,borderRadius:4,
        spanGaps:true,order:2},
      {type:"line",label:"GE Trend",data:geData,
        borderColor:"#1A3169",backgroundColor:"transparent",borderWidth:2.5,
        pointRadius:5,pointBackgroundColor:"#fff",pointBorderColor:"#1A3169",pointBorderWidth:2,
        tension:.35,spanGaps:true,order:1,
        datalabels:{display:true}}
    ]},
    options:{responsive:true,spanGaps:true,
      plugins:{
        legend:{position:"bottom",labels:{boxWidth:12,font:{size:11},
          filter:item=>!item.text.includes("Trend")}},
        tooltip:{callbacks:{
          label:i=>i.dataset.type==="line"?null:` GE: ${i.raw??"-"}`
        }}
      },
      scales:{
        y:{title:{display:true,text:"Grade Equivalent",font:{size:10}},
          ticks:{font:{size:11},callback:v=>v.toFixed(1)},
          grid:{color:"#f0f0f0"},
          suggestedMin:0},
        x:{ticks:{font:{size:11}},grid:{display:false}}
      }
    }
  });
}

// 특정 월의 반 평균 (SR/커리/eval)
function getClassAvgByMonth(cls,field,month){
  const stus=classStu(cls);
  const vals=stus.map(s=>{
    const md=(s.monthlyData||{})[month]||{};
    if(field==="sr") return md.sr?.score&&md.sr?.maxScore?(md.sr.score/md.sr.maxScore*100):null;
    if(field==="curr") return md.currTest?.score&&md.currTest?.maxScore?(md.currTest.score/md.currTest.maxScore*100):null;
    if(field==="eval") return calcEvalTotal(md.eval);
    return null;
  }).filter(v=>v!==null);
  if(!vals.length) return null;
  return (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
}
function getClassAvgDomainByMonth(cls,domainKey,month){
  const stus=classStu(cls);
  const vals=stus.map(s=>{
    const md=(s.monthlyData||{})[month]||{};
    const sc=calcDomainScore((md.eval?.[domainKey]?.items)||[]);
    return sc>0?Math.round(sc/5*100):null;
  }).filter(v=>v!==null);
  if(!vals.length) return 0;
  return (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
}

function copySMSText(el){

// 사진 미리보기 공통 함수
function previewStuPhoto(prefix){
  const input=document.getElementById(prefix+"-photo-input");
  if(!input||!input.files[0]) return;
  const file=input.files[0];
  if(file.size>800*1024){showToast("사진 크기는 800KB 이하로 해주세요");input.value="";return;}
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      // 200x200 리사이즈
      const size=200;
      const canvas=document.createElement("canvas");
      canvas.width=size; canvas.height=size;
      const ctx=canvas.getContext("2d");
      // 정방형 크롭
      const min=Math.min(img.width,img.height);
      const sx=(img.width-min)/2, sy=(img.height-min)/2;
      ctx.drawImage(img,sx,sy,min,min,0,0,size,size);
      const b64=canvas.toDataURL("image/jpeg",0.85);
      if(!window._stuPhotoData) window._stuPhotoData={};
      window._stuPhotoData[prefix]=b64;
      // 미리보기 업데이트
      const prev=document.getElementById(prefix+"-photo-preview");
      if(prev) prev.innerHTML=`<img src="${b64}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      const wrap=document.getElementById(prefix+"-photo-preview-wrap");
      const img2=document.getElementById(prefix+"-photo-preview-img");
      if(wrap){wrap.style.display="flex"; if(img2) img2.src=b64;}
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

async function deleteTransferHistory(id, idx, btn){

  const s=students[id];
  const hist=[...(s.transferHistory||[])];
  hist.splice(idx,1);
  await db.ref("students/"+id+"/transferHistory").set(hist.length>0?hist:null);
  students[id].transferHistory=hist;

let consFeedPage=1;
async function loadConsFeed(page){
  consFeedPage=page;
  const wrap=document.getElementById("cons-feed-wrap");
  if(!wrap)return;
  wrap.innerHTML=`<div style="text-align:center;padding:20px;color:var(--gray);font-size:13px">불러오는 중...</div>`;
  // Firebase에서 전체 상담 데이터 로드
  const snap=await db.ref("consultations").once("value");
  const all=[];
  snap.forEach(stuSnap=>{
    const stuId=stuSnap.key;
    const s=students[stuId];
    if(!s)return;
    // 담임은 본인 반만 (Fix #19)
    if(user.role!=="admin"&&s.cls!==user.cls)return;
    const list=stuSnap.val();
    const items=Array.isArray(list)?list:Object.values(list||{});
    items.forEach(c=>{if(c&&c.date)all.push({...c,stuId,stuName:s.name,stuEname:s.ename,cls:s.cls});});
  });
  all.sort((a,b)=>b.date.localeCompare(a.date));
  const perPage=10;
  const totalPages=Math.max(1,Math.ceil(all.length/perPage));
  const pageData=all.slice((page-1)*perPage,page*perPage);
  if(!all.length){
    wrap.innerHTML=`<div class="card" style="margin-top:12px"><div style="text-align:center;padding:20px;color:var(--gray);font-size:13px">등록된 상담 이력이 없습니다</div></div>`;
    return;
  }
  let feedHtml=`<div class="card" style="margin-top:12px">
    <h3 style="margin-bottom:12px">📋 전체 상담 이력 <span style="font-size:12px;color:var(--gray);font-weight:400">${all.length}건</span></h3>`;
  pageData.forEach(c=>{
    feedHtml+=`<div class="cons-item" style="cursor:pointer" onclick="openConsForStu('${c.stuId}')">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-weight:700;font-size:13px;color:var(--navy)">${c.stuName} <span style="font-weight:400;font-size:11px;color:var(--gray)">${c.stuEname||""} · ${c.cls}반</span></span>
        <span style="font-size:11px;color:var(--gray)">${c.date}</span>
      </div>
      <div style="font-size:12px;color:#444;line-height:1.5">${(c.content||"").slice(0,80)}${(c.content||"").length>80?"…":""}</div>
      ${c.type?`<span style="font-size:10px;background:#eef2ff;color:#1A3169;border-radius:4px;padding:2px 6px;margin-top:4px;display:inline-block">${c.type}</span>`:""}
    </div>`;
  });
  // 페이지네이션
  if(totalPages>1){
    feedHtml+=`<div style="display:flex;justify-content:center;gap:6px;margin-top:12px;flex-wrap:wrap">`;
    for(let p=1;p<=totalPages;p++){
      feedHtml+=`<button onclick="loadConsFeed(${p})" style="padding:5px 10px;border-radius:6px;border:1px solid ${p===page?"#1A3169":"#d0d6e0"};background:${p===page?"#1A3169":"#fff"};color:${p===page?"#C9A84C":"#555"};font-size:12px;cursor:pointer;font-weight:${p===page?"700":"400"}">${p}</button>`;
    }
    feedHtml+=`</div>`;
  }
  feedHtml+=`</div>`;
  wrap.innerHTML=feedHtml;
}
function searchCons(){
  const raw=document.getElementById("cons-search")?.value||"";
  const q=raw.trim().toLowerCase();
  const sug=document.getElementById("cons-suggestions");
  const hint=document.getElementById("cons-hint");
  if(!sug)return;
  if(!q){
    sug.style.display="none";
    sug.innerHTML="";
    if(hint)hint.style.display="block";
    return;
  }
  if(hint)hint.style.display="none";
  const matches=activeStudents().filter(s=>{
    if(user.role!=="admin"&&s.cls!==user.cls) return false;
    return s.name.includes(raw.trim())||s.ename.toLowerCase().includes(q);
  });
  if(!matches.length){
    sug.style.display="block";
    sug.style.border="1px solid #e0e4ec";
    sug.innerHTML='<div style="padding:12px;color:var(--gray);font-size:13px;text-align:center">검색 결과 없음</div>';
    return;
  }
  sug.style.display="block";
  sug.style.border="1px solid #e0e4ec";
  sug.innerHTML=matches.map(s=>`<div class="stu-item" style="cursor:pointer;padding:8px" onclick="selectConsStu('${s.id}','${s.name}')">
    <div class="stu-avatar" style="background:${CLS_COLOR[s.cls]};width:30px;height:30px;font-size:12px">${s.name[0]}</div>
    <div><div style="font-size:13px;font-weight:600">${s.name}</div><div style="font-size:11px;color:var(--gray)">${s.cls}반</div></div>
  </div>`).join("");
}

async function saveClsSubjects(cls){

  rows.forEach(row=>{

    if(label){
      const key=label.toLowerCase().replace(/[^a-z0-9]/g,"_");

function addProgBook(cls){
  const container=document.getElementById("prog-books-"+cls);

  if(placeholder)placeholder.remove();
  const row=document.createElement("div");

function removeProgBook(btn){
  btn.closest(".prog-book-row").remove();
}
function previewFrac(inp){
  const v=inp.value.trim();
  const m=v.match(/^(\d+)\s*\/\s*(\d+)$/);
  if(m){inp.style.borderColor="#2e7d32";inp.style.color="#2e7d32";}
  else{inp.style.borderColor="#d0d6e0";inp.style.color="var(--navy)";}
}
async function saveProg(cls){
  const rows=document.querySelectorAll(`#prog-books-${cls} .prog-book-row`);
  const books=[];
  rows.forEach(row=>{
    const title=row.querySelector(".prog-btitle")?.value?.trim()||"";
    const fracVal=row.querySelector(".prog-bfrac")?.value?.trim()||"";
    let completedUnits=0, totalUnits=0;
    const m=fracVal.match(/^(\d+)\s*\/\s*(\d+)$/);
    if(m){completedUnits=parseInt(m[1]);totalUnits=parseInt(m[2]);}
    else{ totalUnits=parseInt(fracVal)||0; }
    if(title)books.push({title,totalUnits,completedUnits,pct:totalUnits>0?Math.round(completedUnits/totalUnits*100):0});
  });
  const deadline=document.getElementById("prog-dl-"+cls)?.value||"";

  // 1. 반 설정 저장 (템플릿)
  const update={};
  update["classProgress/"+cls+"/"+curMonth+"/books"]=books;
  update["classProgress/"+cls+"/"+curMonth+"/deadline"]=deadline;
  update["classProgress/"+cls+"/"+curMonth+"/updatedAt"]=new Date().toISOString();
  await db.ref("settings").update(update);

  // 2. 해당 반 모든 학생 monthlyData에 동일한 books 일괄 적용
  const stuUpdates={};
  classStu(cls).forEach(s=>{
    stuUpdates[s.id+"/monthlyData/"+curMonth+"/books"]=books;
  });
  if(Object.keys(stuUpdates).length){
    await db.ref("students").update(stuUpdates);
    classStu(cls).forEach(s=>{
      if(!s.monthlyData) s.monthlyData={};
      if(!s.monthlyData[curMonth]) s.monthlyData[curMonth]={};
      s.monthlyData[curMonth].books=books;
    });
  }

  if(!settings.classProgress) settings.classProgress={};
  if(!settings.classProgress[cls]) settings.classProgress[cls]={};
  if(!settings.classProgress[cls][curMonth]) settings.classProgress[cls][curMonth]={};
  settings.classProgress[cls][curMonth].books=books;
  settings.classProgress[cls][curMonth].deadline=deadline;
  await loadSettings();
  showToast(cls+"반 전체("+classStu(cls).length+"명) 진도 적용 완료 ✓");
  renderProg();
}

// ── EXCEL 내보내기 ──
function exportExcel(){
  if(!window.XLSX){ showToast("Excel 라이브러리 로딩 중... 잠시 후 다시 시도하세요"); return; }
  const wb=XLSX.utils.book_new();
  const yr=curMonth.slice(0,4);
  const mo=+curMonth.slice(5);

  CLS.forEach(cls=>{
    const stus=activeStudents().filter(s=>s.cls===cls)
      .sort((a,b)=>a.name.localeCompare(b.name,"ko"));
    if(!stus.length) return;

    const clsSubs=getClsSubjects(cls);

    // 반 평균 미리 계산
    const clsAvgMap={};
    clsSubs.forEach(sub=>{
      const vals=stus.map(s=>{
        const d=((s.monthlyData||{})[curMonth]?.subjects||{})[sub.key]||{};
        return d.score&&d.max?Math.round(d.score/d.max*100):null;
      }).filter(v=>v!==null);
      clsAvgMap[sub.key]=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null;
    });

    // 헤더 행
    const subjHeaders=clsSubs.flatMap(sub=>[sub.label+" 점수", sub.label+" Class Avg", sub.label+" Grade"]);
    const header=[
      "이름","영어이름","학년",
      ...subjHeaders,
      "Overall Avg","Class Overall Avg","Overall Grade",
      "SS","PR","GE","IRL","SR Test Date",
      "담임 코멘트","Head Teacher 코멘트"
    ];

    // 데이터 행
    const rows=stus.map(s=>{
      const md=(s.monthlyData||{})[curMonth]||{};
      const subj=md.subjects||{};
      const sr=md.sr||{};

      // 과목별 점수
      const subjCells=clsSubs.flatMap(sub=>{
        const d=subj[sub.key]||{};
        const pct=d.score&&d.max?Math.round(d.score/d.max*100):null;
        const grade=pct!==null?(pct>=93?"A":pct>=90?"A-":pct>=87?"B+":pct>=83?"B":pct>=80?"B-":pct>=77?"C+":pct>=73?"C":pct>=70?"C-":pct>=60?"D":"F"):"";
        const avg=clsAvgMap[sub.key];
        return [d.score||"", avg!==null?avg+"":"", grade];
      });

      // Overall
      const pcts=clsSubs.map(sub=>{
        const d=subj[sub.key]||{};
        return d.score&&d.max?Math.round(d.score/d.max*100):null;
      }).filter(v=>v!==null);
      const overall=pcts.length?Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length):null;
      const overallGrade=overall!==null?(overall>=93?"A":overall>=90?"A-":overall>=87?"B+":overall>=83?"B":overall>=80?"B-":overall>=77?"C+":overall>=73?"C":overall>=70?"C-":overall>=60?"D":"F"):"";

      // 반 Overall 평균
      const clsOverall=(()=>{
        const avgs=Object.values(clsAvgMap).filter(v=>v!==null);
        return avgs.length?Math.round(avgs.reduce((a,b)=>a+b,0)/avgs.length):null;
      })();

      return [
        s.name, s.ename||"", s.grade||"",
        ...subjCells,
        overall!==null?overall:"", clsOverall!==null?clsOverall:"", overallGrade,
        sr.ss||"", sr.pr||"", sr.ge||"", sr.irl||"", sr.date||"",
        md.teacherComment||"", md.adminComment||""
      ];
    });

    const ws=XLSX.utils.aoa_to_sheet([header,...rows]);

    // 컬럼 너비 설정
    ws["!cols"]=[
      {wch:10},{wch:12},{wch:6},
      ...clsSubs.flatMap(()=>[{wch:8},{wch:10},{wch:6}]),
      {wch:10},{wch:14},{wch:10},
      {wch:6},{wch:6},{wch:6},{wch:6},{wch:16},
      {wch:50},{wch:50}
    ];

    XLSX.utils.book_append_sheet(wb, ws, cls+"반");
  });

  const filename=`Petamus_${yr}년${mo}월_보고서.xlsx`;
  XLSX.writeFile(wb, filename);

const SNAP_PREFIX="petamus_snap_";
const SNAP_MAX=7;

function petamusAutoSnapshot(){
  const today=new Date().toISOString().slice(0,10);
  const key=SNAP_PREFIX+today;
  if(localStorage.getItem(key)) return; // 오늘 이미 저장됨
  try{
    const data=JSON.stringify({students,settings,savedAt:new Date().toISOString()});
    localStorage.setItem(key,data);
    // 7일 초과 삭제
    const keys=Object.keys(localStorage)
      .filter(k=>k.startsWith(SNAP_PREFIX))
      .sort().reverse();
    keys.slice(SNAP_MAX).forEach(k=>localStorage.removeItem(k));
    console.log("✅ 자동 스냅샷 저장 완료:",today);
  }catch(e){
    console.warn("스냅샷 저장 실패:",e);
  }
}

function petamusSnapshotList(){
  return Object.keys(localStorage)
    .filter(k=>k.startsWith(SNAP_PREFIX))
    .map(k=>k.replace(SNAP_PREFIX,""))
    .sort().reverse();
}

async function petamusRestoreSnapshot(date){

  const raw=localStorage.getItem(key);
  if(!raw){ showToast("스냅샷을 찾을 수 없습니다"); return; }
  try{
    const data=JSON.parse(raw);
    showToast("⏳ 복구 중...");

async function uploadSign(key, input){
  const file=input.files[0];
  if(!file) return;
  // 이미지 리사이즈 후 base64 저장
  const reader=new FileReader();
  reader.onload=async(e)=>{
    const img=new Image();
    img.onload=async()=>{
      // 최대 300x120으로 리사이즈
      const maxW=300, maxH=120;
      let w=img.width, h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
      const canvas=document.createElement("canvas");
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      const b64=canvas.toDataURL("image/png");
      await db.ref("settings/signatures/"+key).set(b64);
      SIGN_IMGS[key]=b64;
      showConfirmToast("서명 이미지 저장 완료 ✓","success");
      renderTchrMgmt();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
  input.value="";
}

  await db.ref("settings/signatures/"+key).remove();

async function exportData(){
  try{
    showToast("데이터 준비 중...");
    const [stuSnap, setSnap] = await Promise.all([
      db.ref("students").once("value"),
      db.ref("settings").once("value")
    ]);
    const backup={
      version:"petamus-v1",
      exportedAt:new Date().toISOString(),
      students:stuSnap.val()||{},
      settings:setSnap.val()||{}
    };
    const blob=new Blob([JSON.stringify(backup,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="petamus_backup_"+new Date().toISOString().slice(0,10)+".json";
    a.click();
    URL.revokeObjectURL(url);
    showConfirmToast("백업 파일 다운로드 완료 ✓","success");
  } catch(e){
    showConfirmToast("내보내기 실패: "+e.message,"error");
  }
}
async function importData(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    try{
      const backup=JSON.parse(e.target.result);
      if(!backup.version||!backup.students){
        alert("올바른 백업 파일이 아닙니다."); return;
      }
      if(!confirm(`백업 파일을 불러옵니다.\n내보낸 날짜: ${backup.exportedAt?.slice(0,10)||"알 수 없음"}\n\n⚠️ 현재 데이터를 덮어씁니다. 계속하시겠습니까?`)) return;
      if(!confirm("마지막 확인: 현재 모든 데이터가 백업 파일로 교체됩니다.")) return;
      await db.ref("students").set(backup.students);
      if(backup.settings) await db.ref("settings").set(backup.settings);
      await loadStudents();
      await loadSettings();
      showConfirmToast("데이터 불러오기 완료 ✓","success");
      go("home");
    } catch(err){
      showConfirmToast("불러오기 실패: "+err.message,"error");
    }
  };
  reader.readAsText(file);
  input.value="";
}
